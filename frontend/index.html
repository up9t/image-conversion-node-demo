<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <div style="display: flex; flex-direction: column; align-items: center; gap: 2rem;">
    <h1>Image Converter</h1>
    <form action="http://localhost:8080/convert" method="post" enctype="multipart/form-data">
      <div style="display: flex; flex-direction: column; gap: 1rem; width: 200px;">
        <input type="file" name="image">
        <select name="format">
          <option value="jpeg">JPEG</option>
          <option value="png">PNG</option>
          <option value="webp">WEBP</option>
        </select>
        <input type="submit" value="submit">
      </div>
    </form>
  </div>
</body>

<script>
  const form = document.querySelector('form');
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const formData = new FormData(form);
    fetch('http://localhost:8080/convert', {
      method: 'POST',
      body: formData
    }).then((res) => {
      return res.blob();
    }).then((blob) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `image.${formData.get('format')}`;
      a.click();
    });
  });
</script>

</html>
