services:
  frontend:
    image: ghcr.io/up9t/image-conversion-node-demo/frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    deploy:
      resources:
        limits:
          memory: 32M
    ports:
      - "80:80"
    depends_on:
      backend: 
        condition: service_started

  backend:
    image: ghcr.io/up9t/image-conversion-node-demo/backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - HOST
      - PORT
      - UPLOAD_DIR
    deploy:
      resources:
        limits:
          memory: 128M